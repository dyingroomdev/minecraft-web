version: "3.9"

networks:
  proxy:
    external: true

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: amzcraft-api
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - proxy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: amzcraft-worker
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - proxy

  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://api.amzcraft.top
        VITE_WS_URL: wss://api.amzcraft.top
    container_name: amzcraft-frontend
    restart: unless-stopped
    networks:
      - proxy

  admin:
    build:
      context: apps/admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://api.amzcraft.top
        VITE_WS_URL: wss://api.amzcraft.top
    container_name: amzcraft-admin
    restart: unless-stopped
    networks:
      - proxy
